# ah.toml — dev-programming 场景样板
# 复制到你的项目根后,按自己的 provider 账号和 slot 分工编辑
# 默认拓扑复刻你的项目编程栈:master=claude,a1/a2=codex,a3=antigravity,a4=claude
version = "1"

[master]
cmd = "claude"
enabled = true

[completion]
hook_push_enabled = true
hook_push_events = ["stop"]
hook_push_providers = ["claude", "codex", "antigravity"]

[agents.a1]
provider = "codex"

[agents.a2]
provider = "codex"

[agents.a3]
provider = "antigravity"

[agents.a4]
provider = "claude"
